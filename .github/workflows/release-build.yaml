name: Build Release Binaries

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - goos: linux
            goarch: amd64
            runs-on: ubuntu-latest
          - goos: linux
            goarch: arm64
            runs-on: ubuntu-latest

          # macOS builds
          - goos: darwin
            goarch: amd64
            runs-on: macos-latest
          - goos: darwin
            goarch: arm64
            runs-on: macos-latest

          # Windows builds
          - goos: windows
            goarch: amd64
            runs-on: windows-latest
          - goos: windows
            goarch: arm64
            runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.0'
          cache: true

      - name: Get version from release
        id: version
        shell: bash
        run: |
          # Release tag is in GITHUB_REF_NAME
          VERSION="${{ github.event.release.tag_name }}"
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${GIT_COMMIT}" >> $GITHUB_OUTPUT
          echo "date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
          echo "Commit: ${GIT_COMMIT}"
          echo "Date: ${BUILD_DATE}"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          COMMIT=${{ steps.version.outputs.commit }}
          DATE=${{ steps.version.outputs.date }}
          
          BINARY_NAME=kubectl-weka
          if [ "${{ matrix.goos }}" == "windows" ]; then
            BINARY_NAME=${BINARY_NAME}.exe
          fi
          
          echo "Building ${BINARY_NAME} for ${{ matrix.goos }}/${{ matrix.goarch }}"
          go build \
            -ldflags="-X github.com/weka/kubectl-weka/pkg/version.Version=${VERSION} -X github.com/weka/kubectl-weka/pkg/version.Commit=${COMMIT} -X github.com/weka/kubectl-weka/pkg/version.Date=${DATE}" \
            -o ${BINARY_NAME} \
            .
          
          # Verify binary was created
          if [ ! -f "${BINARY_NAME}" ]; then
            echo "Error: Binary not created"
            exit 1
          fi
          
          ls -lh ${BINARY_NAME}

      - name: Prepare release artifacts (Unix-like systems)
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          GOOS=${{ matrix.goos }}
          GOARCH=${{ matrix.goarch }}
          
          BINARY_NAME=kubectl-weka
          
          # Create raw binary with architecture suffix for direct download
          RAW_NAME=kubectl-weka-${VERSION}-${GOOS}-${GOARCH}
          cp ${BINARY_NAME} ${RAW_NAME}
          
          # Create krew-compatible tar.gz package (format: kubectl-weka_VERSION_OS_ARCH.tar.gz)
          KREW_PACKAGE_NAME=kubectl-weka_${VERSION}_${GOOS}_${GOARCH}
          mkdir -p ${KREW_PACKAGE_NAME}
          cp ${BINARY_NAME} ${KREW_PACKAGE_NAME}/
          tar czf ${KREW_PACKAGE_NAME}.tar.gz ${KREW_PACKAGE_NAME}
          
          echo "RAW_BINARY=${RAW_NAME}" >> $GITHUB_ENV
          echo "KREW_PACKAGE=${KREW_PACKAGE_NAME}.tar.gz" >> $GITHUB_ENV
          
          echo "Created raw binary: ${RAW_NAME}"
          echo "Created krew package: ${KREW_PACKAGE_NAME}.tar.gz"
          ls -lh ${RAW_NAME} ${KREW_PACKAGE_NAME}.tar.gz

      - name: Prepare release artifacts (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $GOOS = "${{ matrix.goos }}"
          $GOARCH = "${{ matrix.goarch }}"
          
          $BINARY_NAME = "kubectl-weka.exe"
          
          # Create raw binary with architecture suffix for direct download
          $RAW_NAME = "kubectl-weka-${VERSION}-${GOOS}-${GOARCH}.exe"
          Copy-Item $BINARY_NAME $RAW_NAME
          
          # Create krew-compatible zip package (format: kubectl-weka_VERSION_OS_ARCH.zip)
          $KREW_PACKAGE_NAME = "kubectl-weka_${VERSION}_${GOOS}_${GOARCH}"
          New-Item -ItemType Directory -Path $KREW_PACKAGE_NAME -Force | Out-Null
          Copy-Item $BINARY_NAME $KREW_PACKAGE_NAME/
          Compress-Archive -Path $KREW_PACKAGE_NAME -DestinationPath "${KREW_PACKAGE_NAME}.zip"
          
          Add-Content -Path $env:GITHUB_ENV -Value "RAW_BINARY=${RAW_NAME}"
          Add-Content -Path $env:GITHUB_ENV -Value "KREW_PACKAGE=${KREW_PACKAGE_NAME}.zip"
          
          Write-Host "Created raw binary: ${RAW_NAME}"
          Write-Host "Created krew package: ${KREW_PACKAGE_NAME}.zip"
          Get-Item $RAW_NAME, "${KREW_PACKAGE_NAME}.zip"

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.RAW_BINARY }}
            ${{ env.KREW_PACKAGE }}
          fail_on_unmatched_files: true



