version: 1

project_name: kubectl-weka

before:
  hooks:
    - go mod tidy

builds:
  # Linux builds
  - id: linux
    main: .
    binary: kubectl-weka
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/weka/kubectl-weka/pkg/version.Version={{.Version}}
      - -X github.com/weka/kubectl-weka/pkg/version.Commit={{.Commit}}
      - -X github.com/weka/kubectl-weka/pkg/version.Date={{.Date}}

  # macOS builds
  - id: darwin
    main: .
    binary: kubectl-weka
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/weka/kubectl-weka/pkg/version.Version={{.Version}}
      - -X github.com/weka/kubectl-weka/pkg/version.Commit={{.Commit}}
      - -X github.com/weka/kubectl-weka/pkg/version.Date={{.Date}}

  # Windows builds
  - id: windows
    main: .
    binary: kubectl-weka
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/weka/kubectl-weka/pkg/version.Version={{.Version}}
      - -X github.com/weka/kubectl-weka/pkg/version.Commit={{.Commit}}
      - -X github.com/weka/kubectl-weka/pkg/version.Date={{.Date}}

archives:
  # Raw binaries (unarchived)
  - id: binaries
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  # Linux and macOS: tar.gz format (compatible with Krew)
  - id: unix
    builds:
      - linux
      - darwin
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  # Windows: zip format (compatible with Krew)
  - id: windows
    builds:
      - windows
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github

release:
  skip_upload: false
  # Allow skipping files that already exist in the release
  allow_different_user: true
  replace_existing_artifacts: true
