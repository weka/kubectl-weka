version: 2

project_name: kubectl-weka

before:
  hooks:
    - go mod tidy

builds:
  - id: kubectl-weka
    main: .
    binary: kubectl-weka
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/weka/kubectl-weka/pkg/version.Version={{.Version}}
      - -X github.com/weka/kubectl-weka/pkg/version.Commit={{.Commit}}
      - -X github.com/weka/kubectl-weka/pkg/version.Date={{.Date}}

archives:
  # Linux and macOS: tar.gz format (compatible with Krew)
  - id: unix
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    goos:
      - linux
      - darwin
    files:
      - none

  # Windows: zip format (compatible with Krew)
  - id: windows
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    goos:
      - windows
    files:
      - none

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
