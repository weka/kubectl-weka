version: 2

project_name: kubectl-weka

before:
  hooks:
    - go mod tidy

builds:
  - id: linux
    main: .
    binary: kubectl-weka
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/weka/kubectl-weka/pkg/version.Version={{.Version}}
      - -X github.com/weka/kubectl-weka/pkg/version.Commit={{.Commit}}
      - -X github.com/weka/kubectl-weka/pkg/version.Date={{.Date}}

  - id: darwin
    main: .
    binary: kubectl-weka
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/weka/kubectl-weka/pkg/version.Version={{.Version}}
      - -X github.com/weka/kubectl-weka/pkg/version.Commit={{.Commit}}
      - -X github.com/weka/kubectl-weka/pkg/version.Date={{.Date}}

  - id: windows
    main: .
    binary: kubectl-weka
    env:
      - CGO_ENABLED=0
    goos: [windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/weka/kubectl-weka/pkg/version.Version={{.Version}}
      - -X github.com/weka/kubectl-weka/pkg/version.Commit={{.Commit}}
      - -X github.com/weka/kubectl-weka/pkg/version.Date={{.Date}}

archives:
  - id: unix
    ids:
      - linux
      - darwin
      - windows
    format_overrides:
      - goos: windows
        formats: [ "binary", "zip" ]
      - goos: !windows
        formats: [ "binary", "tar.gz" ]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github

release:
  skip_upload: false
  replace_existing_artifacts: true
