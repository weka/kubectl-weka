apiVersion: weka.weka.io/v1alpha1
kind: WekaCluster
metadata:
  name: longevity
  namespace: longevity
spec:
  cpuPolicy: auto
  driversDistService: https://10.240.200.5:14000
  dynamicTemplate:
    computeContainers: 8
    computeCores: 12
    driveContainers: 8
    driveCores: 4
    numDrives: 1
    nfsContainers: 2
    nfsCores: 2
    s3Cores: 4
    s3Containers: 3
    s3ExtraCores: 4

  gracefulDestroyDuration: 3s
  hotSpare: 0
  image: quay.io/weka.io/weka-in-container:4.4.10.200
  imagePullSecret: quay-io-robot-secret
  network:
    ethDevice: enp99s0f0np0
  nodeSelector:
    weka.io/dedicated: longevity
  roleNodeSelector:
    s3:
      weka.io/dedicated: infra

  template: dynamic
  rawTolerations:
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Exists
